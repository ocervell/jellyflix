name: docker

# Build the image (and smoke-test it) on PRs and pushes to master.
# No push to Docker Hub here — that happens in publish.yml on a version tag.
on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64, load into the runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ocervell/jellyflix:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — serves the SPA and the /jf proxy config is valid
        run: |
          docker run -d --name jellyflix -e JELLYFIN_SERVER=http://example.invalid:8096 -p 8080:80 ocervell/jellyflix:ci
          for i in $(seq 1 15); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true)
            [ "$code" = "200" ] && break
            sleep 1
          done
          echo "GET / -> $code"
          [ "$code" = "200" ]
          # index.html is served for a deep SPA route too
          curl -fsS http://localhost:8080/some/deep/route | grep -q '<div id="root">'
          echo "SPA fallback OK"
          docker logs jellyflix
          docker rm -f jellyflix
